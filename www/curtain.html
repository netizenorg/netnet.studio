<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>netnet.studio</title>
    <meta name="description" content="hi! (&#9685; &#9694; &#9685;) welcome to netnet.studio, an open-source hypermedia cyberspace for fully realizing the Web's creative potential.">
    <meta name="author" content="netizen.org">

    <!--
     _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _
   /                                    '.
  | hi there! welcome to netnet.studio's |
  | source code! hand-coded from scratch |
  | w/love by the artists at netizen.org |
   ` _ _ _ _ _ __ _ _ _ _ _ _ _ _ _ _  ,/
                                    .'`
                              ( ◕ ◞ ◕ )つ


    -->

    <!-- social media stuff -->
    <meta property="og:title" content="netnet.studio">
    <meta property="og:description" content="hi! (&#9685; &#9694; &#9685;) welcome to netnet.studio, an open-source hypermedia cyberspace for fully realizing the Web's creative potential.">
    <meta property="og:image" content="https://netnet.studio/imags/netnet.png">
    <meta property="og:url" content="https://netnet.studio">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:site_name" content="netnet.studio">
    <meta name="twitter:site" content="@netizenorg">

    <link rel="icon" type="image/png" href="images/favicons/learning-guide.png">
    <link rel="stylesheet" href="/core/styles.css">
    <link rel="stylesheet" href="/widgets/styles.css">
    <style media="screen">
      :root {
        --netizen-text: #e7e5c9;
        --netizen-background: #1c1c3600;
        --netizen-meta: #c3c3db;
        --netizen-tag: #c76ebc;
        --fg-color: #c76ebc;
        --bg-color: #1c1c36;
      }
      body {
        position: relative;
        z-index: 1;

        height: 100vh;
        margin: 0;
        overflow: hidden;

        background-image:
          linear-gradient(#515199a8 2px, transparent 1px),
          linear-gradient(90deg, #515199a8 2px, transparent 1px),
          linear-gradient(0deg, #c76ebca8, #515199a8);
        background-size:
          50px 50px,
          50px 50px,
          auto;
      }

      .widget {
        cursor: auto !important;
        box-shadow: rgba(0, 0, 0, 0.15) 17.8282px 32.5562px 6px;
        /* height: 264px; */
        max-width: 500px;
        left: calc(50vw - 250px);
        top: calc(50vh - 132px);
        z-index: 108;
        transition: none;
        animation: 0.3s forwards openBounce;
        transition: top 0.5s;
      }

      .widget__top {
        cursor: auto !important;
      }

      .widget__inner-html {
        padding-top: 18px;
        font-size: 1.4em;
      }

      .widget__inner-html code {
        padding-top: 0;
      }

      code {
        position: relative;
        top: -0.1em;
        padding: .1em 0.3em 0.2em;
        border-radius: 6px;
        color: var(--bg-color);
        background-color: var(--fg-color);
        font-family: "fira-code", inconsolata, monospace;
        font-size: 14px;
        line-height: 1.4em;
        font-weight: 700;
        cursor: text;
      }
    </style>
  </head>
  <body>

    <div class="widget">
      <div class="widget__top">
        <div class="widget__top__title">netnet.studio</div>
      </div>
      <div class="widget__inner-html">
        ( ◕ ◞ ◕ ) {{MESSAGE}}
      </div>
    </div>

    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="/js/visits.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init({ endpoint: '/api/event' })
      plausible('curtain')
    </script>
    <!-- netizen.org libs -->
    <script src="/nn.min.js"></script>
    <script>
      function resize () {
        if (nn.width <= 530) {
          nn.get('.widget__inner-html').css('font-size', '1em')
          nn.get('.widget').css({
            width: 'calc(100vw - 30px)',
            left: 15,
            top: 60
          })
        } else {
          nn.get('.widget__inner-html').css('font-size', '1.4em')
          nn.get('.widget').css({
            width: 500,
            left: 'calc(50vw - 250px)',
            top: 'calc(50vh - 132px)'
          })
        }
      }

      nn.on('load', resize)
      nn.on('resize', resize)
    </script>
  </body>
</html>
