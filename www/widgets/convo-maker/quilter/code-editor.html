<style media="screen">
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 3fr 1fr;
    height: 100vh;
  }

  #netitor {
    overflow-y: scroll;
    background: var(--netizen-background);
  }

  #nfo {
    padding: 5px 20px;
    background-color: var(--netizen-text);
    border: 20px solid var(--netizen-background);
    font-family: sans-serif;
    color: var(--netizen-background);
  }

  #nfo > p { line-height: 25px; }
  #nfo a { color: var(--netizen-tag); }
  #nfo a:hover { color: var(--netizen-string); }
  #nfo > p code {
    color: var(--netizen-text);
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 14px;
    background-color: var(--netizen-background);
  }

  .error {
    background-color: rgb(100, 0, 0) !important;
    padding: 20px !important;
    color: var(--netizen-text) !important;
  }

  .error a { color: var(--netizen-number) !important; }

</style>

<div id="netitor"></div>
<div id="nfo"></div>

<script src="/nn.min.js"></script>
<script src="/netitor.min.js"></script>
<script>
  const msg = {
    globals: `<p>
      Here you can define any variables that will be made accessible to your convo's passsages. A variable created here named <code>exmaple</code> can be referenced in your passage's text as <code>\${example}</code>. When using new global variables, make sure to list them in the global comment.
    </p>`,
    FUNC: `<p>
      Here you can write a JavaScript function which will be executed when this link is clicked. Do not change the name of the <code>LINK</code> variable, only edit the contents of it's function. When using new global variables, make sure to list them in the global comment of the main "Custom Code" editor (not this one).
    </p>`,
    CODE: `<p>
      Here you can write code that you'd like injected into netnet's editor when netnet speaks this passage. You can specify if you want this code to be editable <select id="editable"><option value="true">true</option><option value="false">false</option></select>, and whether any specific lines should be "spotlight" <input id="spotlight"> (ex: "1-10" or "4,8,16")
    </p>`
  }

  let type = 'globals'

  function reset () {
    nn.get('#nfo').content(msg[type])
    nn.get('#nfo').set({ class: '' })
    ne.spotlight('clear')
  }

  function markErrors (eve) {
    const explainError = (err) => {
      ne.spotlight(err.line)
      nn.get('#nfo').set({ class: 'error' })
      nn.get('#nfo').innerHTML = err.friendly
        ? `<p>${err.friendly}</p>` : `<p>${err.message}</p>`
    }

    ne.marker(null)
    const lines = []
    if (eve.length === 0) window.reset()
    eve.forEach(e => {
      if (lines.includes(e.line)) return
      lines.push(e.line)
      const clk = () => explainError(e)
      if (e.type === 'warning') ne.marker(e.line, 'yellow', clk)
      else ne.marker(e.line, 'red', clk)
    })
  }

  function extractGlobals () {
    const m = ne.code.match(/\/\*\s*global\s+([^*]+)\*\//)
    if (!m) return []
    return m[1]
      .split(',')
      .map(name => name.trim())
      .filter(Boolean)
  }

  function updateCodeListeners (obj) {
    // obj.edit
    // obj.spotlight
    // TODO, listen for changes to #editable && #spotlight
    console.log('payload', obj);
    setTimeout(() => { // HACK: doesn't seem to work for about at least a second
      nn.get('#editable')
        .set({ value: obj.edit || "true" })
        .on('change', (e) => console.log(e.target.value))
      nn.get('#spotlight')
        .set({ value: obj.spotlight || '' })
        .on('input', (e) => {
          console.log(e.target.value);
        })
    }, 1000)
  }

  function sendUpdate () {
    const obj = {}

    if (type === 'globals') {
      const idx = ne.code.indexOf(ne.code.match(/\/\*\s*global\s+([^*]+)\*\//)[0])
      const globals = (idx === 0) ? extractGlobals() : []
      let code = ne.code.split('\n')
      code.shift()
      code = code.join('\n')
      obj.type = 'netitor-globals-update'
      obj.payload = { globals, code }
    } else if (type === 'FUNC') {
      obj.type = 'netitor-func-update'
      obj.payload = { code: ne.code.replace('const LINK = ', '') }
    } else if (type === 'CODE') {
      // TODO edit && spotlight
      obj.type = 'netitor-code-update'
      obj.payload = { code: ne.code }
    } else if (type === 'B4') {
      // TODO
    } else if (type === 'AF') {
      // TODO
    }

    window.opener.postMessage(obj, window.origin)
  }

  // ------------------------------------------ Netitor Setup --------------------

  const ne = new Netitor({
    ele: '#netitor',
    code: '',
    theme: 'dark',
    wrap: true,
    language: 'javascript',
    autoUpdate: true,
    renderWithErrors: true
  })

  ne.on('lint-error', (eve) => {
    // console.log('lint-error', eve)
    eve = eve
      .filter(e => e.jshint.code !== 'W098') // defining var but not using
      .filter(e => e.jshint.code !== 'W117') // using var not previously defined
    markErrors(eve)
  })

  ne.on('cursor-activity', (eve) => {
    console.log('cursor-activity', ne.code)
    sendUpdate()
    reset()
  })

  // -------------------------------------------------- on events ---------------

  nn.on('message', (e) => {
    // console.log(e.data);
    type = e.data.type
    nn.get('#nfo').content(msg[type])
    if (type === 'globals') {
      const garr = e.data.payload.globals
      let code = `/* global ${garr.join(', ')} */\n`
      ne.code = code + e.data.payload.code
    } else if (type === 'FUNC') {
      ne.code = 'const LINK = ' + e.data.payload.code
    } else if (type === 'CODE') {
      console.log(e.data.payload);
      ne.code = e.data.payload.code && e.data.payload.code !== 'undefined'
        ? e.data.payload.code : ''
      ne.language = 'html'
      updateCodeListeners(e.data.payload)
    } else if (type === 'B4') {
      // TODO e.data.payload.before
    } else if (type === 'AF') {
      // TODO e.data.payload.after
    }
    ne.tidy()
  })

  nn.on('beforeunload', (e) => {
    sendUpdate()
  })

  nn.on('keydown', (e) => {
    if (e.key === 'Escape') window.close()
  })

  nn.on('load', () => {
    window.opener.postMessage({ type: 'netitor-ready' }, window.origin)
  })


</script>
