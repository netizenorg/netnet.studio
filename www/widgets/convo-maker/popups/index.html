<div class="menu-bar">
  <div>
    FILE :
    <span id="new-file">new</span>
    <span id="edit-file">edit</span> <!-- TODO: edit an existing Wiget's convo -->
    <span id="open-file">upload</span>
    <span id="save-file">download</span>
  </div>
  <div style="visibility: hidden;">
    CONVO:
    <input type="text" class="input" id="convo-name" placeholder="convo/widget name">
    <button id="custom-code" class="pill-btn pill-btn--secondary" title="create variables/functons accessible to all passages">&lt;/&gt; Code</button> |
    <button id="new" class="pill-btn pill-btn--secondary" title="create a new passage">+ New</button>
    <button id="delete" class="pill-btn pill-btn--secondary" style="opacity:0.5" title="delete selected passage(s)">
      <img style="width: 14px;" src="/images/widgets/trash-meta-color.svg"> Delete
    </button>
    <label for="zoom">Zoom:</label>
    <input type="range" id="zoom" class="range-slider__input">
  </div>
</div>

<div id="modal">
  <div></div>
</div>

<div id="graph-wrapper">
  <div id="graph-container"></div>
</div>

<div id="editor">
  <div class="nav">
    <div id="FUNC-links">
      <!-- buttons for FUNC edit links go here -->
    </div>
    <span class="name" contenteditable="true">Passage Name</span>
    <div style="display: flex; align-items: center;">
      <span class="func-btn make-links" style="background: #e9e9ed;" title="generate missing passages from links">🔗</span>
      <select class="func-btn layout" title="change netnet layout during this passage">
        <option value="default">[default]</option>
         <option value="welcome">welcome</option>
         <option value="separate-window">separate-window</option>
         <option value="dock-left">dock-left</option>
         <option value="full-screen">full-screen</option>
         <option value="dock-bottom">dock-bottom</option>
      </select>
      <span class="close" style="font-size: 28px; margin-left: 10px;">×</span>
    </div>
  </div>
  <textarea></textarea>
</div>
