<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&#9685; &#9694; &#9685; docs</title>
    <meta property="og:title" content="netnet.studio">
    <meta property="og:description" content="(&#9685; &#9694; &#9685;) netnet.studio docs for developers and contributors">
    <meta property="og:image" content="https://netnet.studio/images/netnet.png">
    <meta property="og:url" content="https://netnet.studio">
    <meta name="twitter:card" content="summary_large_image">

  <body class="docs">
    <div class="docs__panel">
      <div class="docs__panel__header">
        <button id="hamburger" class="docs__panel__hamburger" aria-expanded="false" role="navigation">
          <div><span class="screen-reader-only">Open/close mobile menu</span></div>
        </button>
        <div class="docs__panel__search">
          <img src="/images/menu/search.png" alt="Search icon" class="search-icon">
          <input id="search-input" class="search-input" placeholder="search">
        </div>
        <a href="/" class="docs__panel__face">
          <span class="eye">◕</span> <span class="mouth">◞</span> <span class="eye">◕</span>
          <span class="screen-reader-only">netnet.studio home</span>
        </a>
      </div>
      {{nav}}
    </div>

    <div class="docs__viewer">
      <div class="docs__viewer-inner">
        {{content}}
      </div>
    </div>

    <script src="/netitor.min.js"></script>
